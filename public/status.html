<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SherpaCarta Status</title>
<link rel="canonical" href="https://sherpacarta.org/status.html">
<style>
  body{font-family:system-ui,sans-serif;max-width:560px;margin:2rem auto;padding:1rem;background:#060a06;color:#e8ede8;line-height:1.6}
  h1{color:#10b981;font-size:1.5rem}
  .ok{color:#10b981}.warn{color:#d4af37}
  a{color:#34d399}
</style>
</head>
<body>
  <h1>SherpaCarta Status</h1>
  <p><a href="/">← sherpacarta.org</a></p>
  <p id="main-status" class="ok">● All systems operational</p>
  <ul>
    <li>CDN / Cloudflare Pages — <span class="ok">operational</span></li>
    <li>Static API — <span class="ok">operational</span></li>
    <li>Nostr relays — <span class="warn">third-party</span></li>
    <li>Lightning donations — <span class="warn">BTC live · LN pending</span></li>
  </ul>
  <p style="font-size:.8rem;color:#5a6a5a">Last checked: <span id="ts"></span>. Zero server-side tracking.</p>
  <script>document.getElementById('ts').textContent=new Date().toISOString();fetch('/api/v1/hash.json').then(r=>r.ok?null:Promise.reject()).catch(()=>{document.getElementById('main-status').className='warn';document.getElementById('main-status').textContent='● API check failed — site may be updating'});</script>
</body>
</html>
